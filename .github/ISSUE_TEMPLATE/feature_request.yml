name: Feature request
description: Suggest an improvement
labels: [enhancement]
body:
    - type: input
      id: summary
      attributes:
          label: Feature summary
          placeholder: Add keyboard navigation support for modal dialogs
      validations:
          required: true

    - type: textarea
      id: problem
      attributes:
          label: Problem statement
          description: What problem does this feature solve?
      validations:
          required: true

    - type: textarea
      id: proposal
      attributes:
          label: Proposed solution
          description: Describe your suggested implementation.
      validations:
          required: true

    - type: textarea
      id: alternatives
      attributes:
          label: Alternatives considered
